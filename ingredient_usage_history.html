    <script>
        // 드롭다운 토글 함수
        function toggleDropdown(id) {
            const dropdown = document.getElementById(id);
            if (dropdown) {
                dropdown.classList.toggle('open');
            }
        }

        // 전역 변수
        let currentUsageTab = 'supplier';
        let currentUsageData = [];

        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', function() {
            // 기본 날짜 설정 (최근 1개월)
            setDateRange('month');
        });

        // 기간 설정 단축 버튼
        function setDateRange(range) {
            const today = new Date();
            const endDate = today.toISOString().split('T')[0];
            let startDate;

            switch(range) {
                case 'week':
                    const weekAgo = new Date(today);
                    weekAgo.setDate(weekAgo.getDate() - 7);
                    startDate = weekAgo.toISOString().split('T')[0];
                    break;
                case 'month':
                    const monthAgo = new Date(today);
                    monthAgo.setMonth(monthAgo.getMonth() - 1);
                    startDate = monthAgo.toISOString().split('T')[0];
                    break;
                case 'quarter':
                    const quarterAgo = new Date(today);
                    quarterAgo.setMonth(quarterAgo.getMonth() - 3);
                    startDate = quarterAgo.toISOString().split('T')[0];
                    break;
            }

            document.getElementById('usageStartDate').value = startDate;
            document.getElementById('usageEndDate').value = endDate;
        }

        // 사업장 ID 가져오기
        function getCurrentSiteId() {
            if (typeof SiteSelector !== 'undefined') {
                const context = SiteSelector.getCurrentContext();
                return context?.site_id || null;
            }
            return null;
        }

        // 탭 전환
        function switchUsageTab(tab) {
            currentUsageTab = tab;

            // 탭 버튼 스타일 업데이트
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            const activeTab = document.getElementById(`tabBy${tab.charAt(0).toUpperCase() + tab.slice(1)}`);
            if (activeTab) {
                activeTab.classList.add('active');
            }

            // 이미 날짜가 있으면 다시 조회
            if (document.getElementById('usageStartDate').value && document.getElementById('usageEndDate').value) {
                loadUsageStats();
            }
        }

        // 통계 데이터 로드
        async function loadUsageStats() {
            const startDate = document.getElementById('usageStartDate').value;
            const endDate = document.getElementById('usageEndDate').value;

            if (!startDate || !endDate) {
                alert('기간을 선택해주세요.');
                return;
            }

            // 사업장 ID
            const siteId = getCurrentSiteId();
            const siteParam = siteId ? `&site_id=${siteId}` : '';

            // API URL
            let apiUrl = '';
            switch (currentUsageTab) {
                case 'supplier':
                    apiUrl = `/api/ingredient-usage/by-supplier?start_date=${startDate}&end_date=${endDate}${siteParam}`;
                    break;
                case 'item':
                    apiUrl = `/api/ingredient-usage/by-item?start_date=${startDate}&end_date=${endDate}${siteParam}`;
                    break;
                case 'date':
                    apiUrl = `/api/ingredient-usage/by-date?start_date=${startDate}&end_date=${endDate}${siteParam}`;
                    break;
            }

            try {
                const tbody = document.getElementById('usageTableBody');
                tbody.innerHTML = '<tr><td colspan="6" class="loading-message"><i class="fas fa-spinner fa-spin"></i> 조회 중...</td></tr>';

                const response = await fetch(apiUrl);
                const result = await response.json();

                if (result.success) {
                    currentUsageData = result.data;
                    renderUsageTable(result.data, result.summary);
                } else {
                    tbody.innerHTML = `<tr><td colspan="6" class="no-data-message" style="color: #dc3545;">조회 실패: ${result.error}</td></tr>`;
                }
            } catch (error) {
                console.error('사용내역 조회 오류:', error);
                document.getElementById('usageTableBody').innerHTML =
                    `<tr><td colspan="6" class="no-data-message" style="color: #dc3545;">오류 발생: ${error.message}</td></tr>`;
            }
        }

        // 테이블 렌더링
        function renderUsageTable(data, summary) {
            const thead = document.getElementById('usageTableHead');
            const tbody = document.getElementById('usageTableBody');
            const summaryDiv = document.getElementById('usageSummary');
            const summaryText = document.getElementById('usageSummaryText');

            // 요약 정보
            if (summary) {
                summaryDiv.classList.add('show');
                if (currentUsageTab === 'supplier') {
                    summaryText.innerHTML = `<i class="fas fa-info-circle"></i> ${summary.period} | 총 ${summary.total_suppliers}개 업체 | 총 금액: ${(summary.total_amount || 0).toLocaleString()}원`;
                } else if (currentUsageTab === 'item') {
                    summaryText.innerHTML = `<i class="fas fa-info-circle"></i> ${summary.period} | 총 ${summary.total_items}개 품목 | 총 사용량: ${(summary.total_qty || 0).toLocaleString()}g (${(summary.total_qty_kg || 0).toLocaleString()}kg)`;
                } else if (currentUsageTab === 'date') {
                    summaryText.innerHTML = `<i class="fas fa-info-circle"></i> ${summary.period} | 총 ${summary.total_days}일 | 총 금액: ${(summary.total_amount || 0).toLocaleString()}원`;
                }
            }

            // 헤더
            let headerHtml = '';
            switch (currentUsageTab) {
                case 'supplier':
                    headerHtml = `
                        <tr>
                            <th style="width: 30%;">협력업체</th>
                            <th class="text-center" style="width: 12%;">발주건수</th>
                            <th class="text-right" style="width: 15%;">총 발주량(kg)</th>
                            <th class="text-right" style="width: 20%;">총 금액</th>
                            <th class="text-center" style="width: 12%;">비율</th>
                        </tr>`;
                    break;
                case 'item':
                    headerHtml = `
                        <tr>
                            <th style="width: 8%;">식자재코드</th>
                            <th style="width: 16%;">식자재명</th>
                            <th style="width: 10%;">규격</th>
                            <th class="text-center" style="width: 5%;">단위</th>
                            <th class="text-center" style="width: 6%;">원산지</th>
                            <th style="width: 10%;">업체명</th>
                            <th class="text-center" style="width: 7%;">발주포함</th>
                            <th class="text-center" style="width: 7%;">메뉴사용</th>
                            <th class="text-right" style="width: 10%;">총사용량</th>
                            <th class="text-right" style="width: 11%;">총 금액</th>
                        </tr>`;
                    break;
                case 'date':
                    headerHtml = `
                        <tr>
                            <th style="width: 20%;">식단표 날짜</th>
                            <th class="text-center" style="width: 15%;">발주건수</th>
                            <th class="text-center" style="width: 15%;">품목수</th>
                            <th class="text-right" style="width: 20%;">총 발주량(kg)</th>
                            <th class="text-right" style="width: 20%;">총 금액</th>
                        </tr>`;
                    break;
            }
            thead.innerHTML = headerHtml;

            // 데이터 없음
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="no-data-message">해당 기간에 발주 데이터가 없습니다.</td></tr>';
                return;
            }

            // 데이터 행
            let rowsHtml = '';
            data.forEach((item, idx) => {
                switch (currentUsageTab) {
                    case 'supplier':
                        rowsHtml += `
                            <tr>
                                <td>${item.supplier_name}</td>
                                <td class="text-center">${item.order_count}</td>
                                <td class="text-right">${item.total_qty_kg.toLocaleString()}</td>
                                <td class="text-right price-value">${item.total_amount.toLocaleString()}원</td>
                                <td class="text-center"><span class="ratio-badge">${item.ratio}%</span></td>
                            </tr>`;
                        break;
                    case 'item':
                        rowsHtml += `
                            <tr>
                                <td style="font-size: 11px; color: #666;">${item.ingredient_code}</td>
                                <td>${item.ingredient_name}</td>
                                <td style="font-size: 12px;">${item.specification || '-'}</td>
                                <td class="text-center">${item.unit || '-'}</td>
                                <td class="text-center">${item.origin || '-'}</td>
                                <td style="font-size: 12px;">${item.supplier_name || '-'}</td>
                                <td class="text-center">${item.order_include_count || 0}</td>
                                <td class="text-center">${item.menu_count || 0}</td>
                                <td class="text-right">${(item.total_qty || 0).toLocaleString()}${item.unit || 'g'}</td>
                                <td class="text-right price-value">${item.total_amount.toLocaleString()}원</td>
                            </tr>`;
                        break;
                    case 'date':
                        rowsHtml += `
                            <tr>
                                <td>${item.usage_date}</td>
                                <td class="text-center">${item.order_count}</td>
                                <td class="text-center">${item.item_count}</td>
                                <td class="text-right">${item.total_qty_kg.toLocaleString()}</td>
                                <td class="text-right price-value">${item.total_amount.toLocaleString()}원</td>
                            </tr>`;
                        break;
                }
            });
            tbody.innerHTML = rowsHtml;
        }

        // 엑셀 다운로드
        function exportUsageToExcel() {
            if (!currentUsageData || currentUsageData.length === 0) {
                alert('다운로드할 데이터가 없습니다. 먼저 조회해주세요.');
                return;
            }

            const startDate = document.getElementById('usageStartDate').value;
            const endDate = document.getElementById('usageEndDate').value;

            // CSV 생성
            let csvContent = '\uFEFF'; // BOM

            switch (currentUsageTab) {
                case 'supplier':
                    csvContent += '협력업체,발주건수,총발주량(kg),총금액,비율(%)\n';
                    currentUsageData.forEach(item => {
                        csvContent += `"${item.supplier_name}",${item.order_count},${item.total_qty_kg},${item.total_amount},${item.ratio}\n`;
                    });
                    break;
                case 'item':
                    csvContent += '식자재코드,식자재명,규격,단위,원산지,업체명,발주포함횟수,메뉴사용횟수,총사용량,총금액\n';
                    currentUsageData.forEach(item => {
                        csvContent += `"${item.ingredient_code}","${item.ingredient_name}","${item.specification || ''}","${item.unit || ''}","${item.origin || ''}","${item.supplier_name || ''}",${item.order_include_count || 0},${item.menu_count || 0},${item.total_qty || 0},${item.total_amount}\n`;
                    });
                    break;
                case 'date':
                    csvContent += '식단표 날짜,발주건수,품목수,총발주량(kg),총금액\n';
                    currentUsageData.forEach(item => {
                        csvContent += `${item.usage_date},${item.order_count},${item.item_count},${item.total_qty_kg},${item.total_amount}\n`;
                    });
                    break;
            }

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const tabName = currentUsageTab === 'supplier' ? '업체별' : (currentUsageTab === 'item' ? '품목별' : '일자별');
            link.href = URL.createObjectURL(blob);
            link.download = `식자재사용내역_${tabName}_${startDate}_${endDate}.csv`;
            link.click();
        }
    </script>

    <!-- 사업장 선택기 -->
    <script src="/static/modules/core/site-selector.js"></script>
    <script>
        // 사업장 선택기 초기화
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof SiteSelector !== 'undefined') {
                SiteSelector.init('usage-site-selector');
                SiteSelector.on('siteChange', function(context) {
                    console.log('사업장 변경:', context);
                    // 데이터 새로고침
                    if (document.getElementById('usageStartDate').value && document.getElementById('usageEndDate').value) {
                        loadUsageStats();
                    }
                });
            }
        });
    </script>
