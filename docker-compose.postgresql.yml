version: '3.8'

services:
  postgresql:
    image: postgres:14
    container_name: daham_postgresql
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: daham_meal
      POSTGRES_USER: daham_user
      POSTGRES_PASSWORD: daham_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./postgresql_init:/docker-entrypoint-initdb.d
    command: [
      "postgres",
      "-c", "log_statement=all",
      "-c", "log_destination=stderr",
      "-c", "logging_collector=on",
      "-c", "max_connections=200",
      "-c", "shared_buffers=256MB",
      "-c", "effective_cache_size=1GB"
    ]

  # PostgreSQL 관리 도구 (선택사항)
  adminer:
    image: adminer:4
    container_name: daham_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgresql

volumes:
  postgresql_data:
    driver: local