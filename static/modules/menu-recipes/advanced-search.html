<!-- 고급 레시피 검색 패널 -->
<div class="advanced-search-panel" id="advancedSearchPanel" style="display: none;">
    <div class="search-header">
        <h3>🔍 고급 레시피 검색</h3>
        <small>30,000+ 레시피 대상 고성능 Full-text 검색</small>
    </div>

    <div class="search-form">
        <div class="search-row">
            <div class="search-field">
                <label>검색어</label>
                <input type="text" id="advancedSearchQuery" placeholder="레시피명, 재료명, 조리법..." />
            </div>
            <div class="search-field">
                <label>카테고리</label>
                <select id="advancedSearchCategory">
                    <option value="">전체 카테고리</option>
                    <option value="국">국</option>
                    <option value="밥">밥</option>
                    <option value="찌개">찌개</option>
                    <option value="조림">조림</option>
                    <option value="무침">무침</option>
                    <option value="볶음">볶음</option>
                    <option value="구이">구이</option>
                    <option value="튀김">튀김</option>
                </select>
            </div>
        </div>

        <div class="search-row">
            <div class="search-field">
                <label>최대 난이도</label>
                <select id="advancedSearchDifficulty">
                    <option value="">제한 없음</option>
                    <option value="1">1 (매우 쉬움)</option>
                    <option value="2">2 (쉬움)</option>
                    <option value="3">3 (보통)</option>
                    <option value="4">4 (어려움)</option>
                    <option value="5">5 (매우 어려움)</option>
                </select>
            </div>
            <div class="search-field">
                <label>최대 조리시간 (분)</label>
                <input type="number" id="advancedSearchTime" placeholder="예: 30" min="1" max="300" />
            </div>
        </div>

        <div class="search-row">
            <div class="search-field">
                <label>태그</label>
                <input type="text" id="advancedSearchTags" placeholder="예: 비건, 글루텐프리 (쉼표로 구분)" />
            </div>
            <div class="search-field">
                <label>정렬 기준</label>
                <select id="advancedSearchSort">
                    <option value="popularity">인기도순</option>
                    <option value="name">이름순</option>
                    <option value="created_at">최신순</option>
                    <option value="cost">비용순</option>
                </select>
            </div>
        </div>

        <div class="search-actions">
            <button type="button" class="btn btn-primary" onclick="performAdvancedSearch()">
                <i class="fas fa-search"></i> 검색
            </button>
            <button type="button" class="btn btn-secondary" onclick="clearAdvancedSearch()">
                <i class="fas fa-eraser"></i> 초기화
            </button>
            <button type="button" class="btn btn-info" onclick="exportSearchResults()">
                <i class="fas fa-download"></i> 결과 내보내기
            </button>
        </div>
    </div>

    <!-- 검색 결과 요약 -->
    <div class="search-results-summary" id="searchResultsSummary" style="display: none;">
        <div class="summary-stats">
            <div class="stat-item">
                <span class="stat-value" id="totalResults">0</span>
                <span class="stat-label">총 결과</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="searchTime">0ms</span>
                <span class="stat-label">검색 시간</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="avgCost">₩0</span>
                <span class="stat-label">평균 비용</span>
            </div>
        </div>
    </div>
</div>

<!-- 검색 결과 컨테이너 -->
<div class="search-results-container" id="searchResultsContainer" style="display: none;">
    <div class="results-header">

<script>
// 고급 검색 JavaScript 함수들

function toggleAdvancedSearch() {
    const panel = document.getElementById('advancedSearchPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

async function performAdvancedSearch() {
    const searchParams = {
        q: document.getElementById('advancedSearchQuery').value,
        category: document.getElementById('advancedSearchCategory').value,
        difficulty: document.getElementById('advancedSearchDifficulty').value,
        max_time: document.getElementById('advancedSearchTime').value,
        tags: document.getElementById('advancedSearchTags').value,
        sort: document.getElementById('advancedSearchSort').value,
        page: 1,
        size: 20
    };

    try {
        await recipeUI.updateSearchResults(searchParams);

        // 검색 결과 컨테이너 표시
        document.getElementById('searchResultsContainer').style.display = 'block';

    } catch (error) {
        console.error('검색 실패:', error);
        alert('검색 중 오류가 발생했습니다: ' + error.message);
    }
}

function clearAdvancedSearch() {
    document.getElementById('advancedSearchQuery').value = '';
    document.getElementById('advancedSearchCategory').value = '';
    document.getElementById('advancedSearchDifficulty').value = '';
    document.getElementById('advancedSearchTime').value = '';
    document.getElementById('advancedSearchTags').value = '';
    document.getElementById('advancedSearchSort').value = 'popularity';

    // 검색 결과 숨기기
    document.getElementById('searchResultsContainer').style.display = 'none';
    document.getElementById('searchResultsSummary').style.display = 'none';
}

async function calculateBulkCosts() {
    if (!recipeUI.currentRecipes.length) {
        alert('계산할 레시피가 없습니다.');
        return;
    }

    const recipeIds = recipeUI.currentRecipes.map(r => r.id);

    try {
        const result = await recipeAPI.calculateBulkCosts(recipeIds, 1);

        // 일괄 계산 결과 표시
        showBulkCostResults(result.data);

    } catch (error) {
        alert('일괄 비용 계산 실패: ' + error.message);
    }
}

async function getMarketAnalysis() {
    const category = document.getElementById('advancedSearchCategory').value;

    try {
        const result = await recipeAPI.getMarketAnalysis(category, 50);
        showMarketAnalysis(result.data);

    } catch (error) {
        alert('시장 분석 실패: ' + error.message);
    }
}

function showBulkCostResults(data) {
    // 일괄 비용 계산 결과를 모달로 표시
    const modal = document.getElementById('costCalculationModal');
    const body = document.getElementById('costCalculationBody');

    body.innerHTML = `
        <div class="bulk-cost-summary">
            <h4>📊 일괄 비용 계산 결과</h4>
            <div class="summary-grid">
                <div class="summary-item">
                    <label>처리된 레시피</label>
                    <span>${data.summary.total_recipes_processed}개</span>
                </div>
                <div class="summary-item">
                    <label>총 합계 비용</label>
                    <span>₩${data.summary.total_combined_cost.toLocaleString()}</span>
                </div>
                <div class="summary-item">
                    <label>평균 레시피 비용</label>
                    <span>₩${data.summary.average_cost_per_recipe.toLocaleString()}</span>
                </div>
                <div class="summary-item">
                    <label>평균 가격 변동성</label>
                    <span>${data.summary.average_price_volatility}%</span>
                </div>
            </div>

            <div class="performance-note">
                계산 시간: ${data.performance.calculation_time_ms}ms
                (레시피당 평균 ${data.performance.average_time_per_recipe_ms}ms)
            </div>
        </div>
    `;

    modal.style.display = 'block';
}

function showMarketAnalysis(data) {
    const modal = document.getElementById('marketAnalysisModal');
    const body = document.getElementById('marketAnalysisBody');

    const categoryBreakdown = Object.entries(data.category_breakdown)
        .map(([category, stats]) => `
            <tr>
                <td>${category}</td>
                <td>${stats.recipe_count}</td>
                <td>₩${stats.avg_cost.toLocaleString()}</td>
                <td>${stats.avg_volatility}%</td>
                <td>${stats.high_volatility_count}</td>
            </tr>
        `).join('');

    body.innerHTML = `
        <div class="market-analysis">
            <div class="analysis-summary">
                <h4>📈 시장 분석 개요</h4>
                <div class="summary-stats">
                    <div class="stat">
                        <label>분석 레시피 수</label>
                        <span>${data.recipes_analyzed.toLocaleString()}</span>
                    </div>
                    <div class="stat">
                        <label>총 시장 가치</label>
                        <span>₩${data.total_market_value.toLocaleString()}</span>
                    </div>
                    <div class="stat">
                        <label>평균 레시피 비용</label>
                        <span>₩${data.average_recipe_cost.toLocaleString()}</span>
                    </div>
                </div>
            </div>

            <div class="category-analysis">
                <h4>📊 카테고리별 분석</h4>
                <table class="analysis-table">
                    <thead>
                        <tr>
                            <th>카테고리</th>
                            <th>레시피 수</th>
                            <th>평균 비용</th>
                            <th>평균 변동성</th>
                            <th>고변동 레시피</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${categoryBreakdown}
                    </tbody>
                </table>
            </div>

            <div class="market-insights">
                <h4>💡 시장 인사이트</h4>
                <ul>
                    <li><strong>가장 비싼 카테고리:</strong> ${data.market_insights.most_expensive_category || 'N/A'}</li>
                    <li><strong>가장 변동성이 큰 카테고리:</strong> ${data.market_insights.most_volatile_category || 'N/A'}</li>
                    <li><strong>고변동성 레시피 총 개수:</strong> ${data.market_insights.total_high_volatility_recipes}</li>
                </ul>
            </div>

            <div class="analysis-note">
                <small>84,215개 식자재 데이터 기반 분석 (${data.analyzed_at})</small>
            </div>
        </div>
    `;

    modal.style.display = 'block';
}

// 모달 닫기 함수들
function closeRecipeDetailModal() {
    document.getElementById('recipeDetailModal').style.display = 'none';
}

function closeCostCalculationModal() {
    document.getElementById('costCalculationModal').style.display = 'none';
}

function closeMarketAnalysisModal() {
    document.getElementById('marketAnalysisModal').style.display = 'none';
}

// 검색 결과 내보내기
function exportSearchResults() {
    if (!recipeUI.currentRecipes.length) {
        alert('내보낼 검색 결과가 없습니다.');
        return;
    }

    // CSV 형태로 내보내기
    const headers = ['레시피명', '카테고리', '1인분 비용', '인기도', '재료 수'];
    const csvContent = [
        headers.join(','),
        ...recipeUI.currentRecipes.map(recipe => [
            `"${recipe.recipe_name}"`,
            recipe.category,
            recipe.cost_per_serving || 0,
            recipe.popularity_score || 0,
            recipe.ingredient_count || 0
        ].join(','))
    ].join('\n');

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `recipe_search_results_${new Date().toISOString().split('T')[0]}.csv`;
    link.click();
}
</script>
