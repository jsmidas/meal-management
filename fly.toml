app = "daham-meal-management"
primary_region = "nrt"  # 도쿄 리전

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "uploads_data"
  destination = "/app/static/uploads"

[[vm]]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  PORT = "8080"
  PYTHONIOENCODING = "utf-8"
