<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>급식관리 - 로그인</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-tagline {
            color: #667eea;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .logo-image {
            width: 80px;
            height: auto;
            margin-bottom: 15px;
        }

        .logo h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }


        .info-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }

        .link-box {
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .link-box a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .link-box a:hover {
            text-decoration: underline;
        }

        .login-type-selector {
            display: flex;
            margin-bottom: 25px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #667eea;
        }
        .login-type-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: white;
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-type-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .login-type-btn:first-child {
            border-right: 1px solid #667eea;
        }

    </style>
</head>

        </div>

        <div class="login-type-selector">
            <button type="button" class="login-type-btn active" data-type="user" onclick="setLoginType('user')">
                👤 일반 사용자
            </button>
            <button type="button" class="login-type-btn" data-type="supplier" onclick="setLoginType('supplier')">
                🏭 협력업체
            </button>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username" id="usernameLabel">사용자명</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group" style="margin-bottom: 10px;">
                <label style="display: flex; align-items: center; justify-content: center; font-size: 14px; color: #666; cursor: pointer; white-space: nowrap;">
                    <input type="checkbox" id="rememberMe" style="margin-right: 8px; transform: scale(1.1);">
                    로그인 정보 저장
                </label>
            </div>

            <button type="submit" class="login-btn">로그인</button>

            <div id="errorMessage" class="error-message"></div>
        </form>

    </div>

    <script>
        // 로그인 유형 (user 또는 supplier)
        let loginType = 'user';

        function setLoginType(type) {
            loginType = type;
            // 버튼 스타일 변경
            document.querySelectorAll('.login-type-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.login-type-btn[data-type="${type}"]`).classList.add('active');

            // 라벨 변경
            const usernameLabel = document.getElementById('usernameLabel');
            if (type === 'supplier') {
                usernameLabel.textContent = '로그인 ID';
                document.getElementById('username').placeholder = '협력업체 로그인 ID';
            } else {
                usernameLabel.textContent = '사용자명';
                document.getElementById('username').placeholder = '';
            }
        }

        // 페이지 로드 시 저장된 정보 불러오기
        window.addEventListener('load', function() {
            const savedUsername = localStorage.getItem('saved_username');
            localStorage.removeItem('saved_password');
            const rememberMe = localStorage.getItem('remember_me') === 'true';
            const savedLoginType = localStorage.getItem('saved_login_type');

            if (savedLoginType) {
                setLoginType(savedLoginType);
            }

            if (rememberMe && savedUsername) {
                document.getElementById('username').value = savedUsername;
                document.getElementById('rememberMe').checked = true;
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorDiv = document.getElementById('errorMessage');

            try {
                const baseUrl = window.location.origin;
                let apiUrl, requestBody, redirectUrl;

                if (loginType === 'supplier') {
                    // 협력업체 로그인
                    apiUrl = `${baseUrl}/api/supplier/login`;
                    requestBody = { login_id: username, password: password };
                    redirectUrl = '/supplier_portal.html';
                } else {
                    // 일반 사용자 로그인
                    apiUrl = `${baseUrl}/api/auth/login`;
                    requestBody = { username, password };
                    redirectUrl = '/dashboard.html';
                }

                console.log('로그인 시도:', { loginType, username });

                const response = await fetch(`${apiUrl}?v=${Date.now()}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestBody)
                });

                const responseText = await response.text();
                let result;
                try {
                    result = JSON.parse(responseText);
                } catch (e) {
                    console.error('JSON 파싱 오류:', e);
                    throw new Error('서버 응답 형식 오류');
                }

                if (result.success) {
                    console.log('로그인 성공');

                    // 토큰 저장
                    if (loginType === 'supplier') {
                        localStorage.setItem('supplier_token', result.data.token || 'supplier_' + Date.now());
                        localStorage.setItem('supplier_session', JSON.stringify(result.data));
                        localStorage.setItem('supplier_info', JSON.stringify(result.data));
                    } else {
                        localStorage.setItem('auth_token', result.data.token || 'temp_token_' + Date.now());
                        // user 객체를 저장 (username, role 포함)
                        localStorage.setItem('user_info', JSON.stringify(result.data.user || result.data));
                    }

                    // 아이디 저장 기능
                    if (rememberMe) {
                        localStorage.setItem('saved_username', username);
                        localStorage.setItem('saved_login_type', loginType);
                        localStorage.setItem('remember_me', 'true');
                    } else {
                        localStorage.removeItem('saved_username');
                        localStorage.removeItem('saved_login_type');
                        localStorage.removeItem('remember_me');
                    }

                    window.location.href = redirectUrl;
                } else {
                    errorDiv.textContent = result.message || result.error || '로그인에 실패했습니다.';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('로그인 오류:', error);
                errorDiv.textContent = `서버 연결 실패: ${error.message}`;
                errorDiv.style.display = 'block';
            }
        });


        // 로그인 페이지 진입 시 모든 인증 토큰 삭제 (자동 리다이렉트 제거)
        localStorage.removeItem('auth_token');
        localStorage.removeItem('user');
        localStorage.removeItem('user_info');
        localStorage.removeItem('token');
        localStorage.removeItem('supplier_token');
        localStorage.removeItem('supplier_info');
        localStorage.removeItem('supplier_session');
        console.log('로그인 페이지 로드됨 - 기존 토큰 삭제 완료');
    </script>
</body>
</html>
