<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레시피-식자재 불일치 수정</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Malgun Gothic', sans-serif; background: #f5f5f5; }
        .container { display: flex; height: 100vh; }

        /* 왼쪽: 불일치 목록 */
        .left-panel { width: 350px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .panel-header { padding: 15px; background: #e74c3c; color: #fff; font-weight: bold; }
        .filter-box { padding: 10px; border-bottom: 1px solid #ddd; }
        .filter-box input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .recipe-list { flex: 1; overflow-y: auto; }
        .recipe-item { padding: 12px 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .recipe-item:hover { background: #f9f9f9; }
        .recipe-item.active { background: #e8f4fd; border-left: 3px solid #3498db; }
        .recipe-item .id { color: #999; font-size: 12px; }
        .recipe-item .name { font-weight: bold; margin: 3px 0; }
        .recipe-item .missing { color: #e74c3c; font-size: 12px; }
        .recipe-item.fixed { opacity: 0.5; }
        .recipe-item.fixed .name::after { content: ' ✓'; color: #27ae60; }

        /* 중앙: 현재 레시피 */
        .center-panel { flex: 1; display: flex; flex-direction: column; background: #fff; margin: 0 10px; }
        .center-panel .panel-header { background: #3498db; }
        .current-ingredients { flex: 1; overflow-y: auto; padding: 15px; }
        .ing-item { display: flex; align-items: center; padding: 10px; margin-bottom: 8px; background: #f9f9f9; border-radius: 4px; }
        .ing-item .ing-name { flex: 1; }
        .ing-item .ing-qty { width: 80px; margin: 0 10px; }
        .ing-item .btn-remove { background: #e74c3c; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .no-recipe { padding: 50px; text-align: center; color: #999; }

        /* 오른쪽: 식자재 검색 */
        .right-panel { width: 400px; background: #fff; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
        .right-panel .panel-header { background: #27ae60; }
        .search-box { padding: 10px; border-bottom: 1px solid #ddd; }
        .search-box input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .search-results { flex: 1; overflow-y: auto; }
        .search-item { padding: 10px 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; }
        .search-item:hover { background: #e8f8e8; }
        .search-item .s-name { flex: 1; font-size: 13px; }
        .search-item .s-price { color: #27ae60; font-size: 12px; margin-left: 10px; }
        .search-item .s-unit { color: #999; font-size: 11px; }

        /* 통계 */
        .stats { padding: 10px 15px; background: #f9f9f9; border-top: 1px solid #ddd; font-size: 13px; }
        .stats span { margin-right: 15px; }
        .stats .total { color: #e74c3c; }
        .stats .fixed { color: #27ae60; }

        /* 버튼 */
        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-success { background: #27ae60; color: #fff; }
        .btn-danger { background: #e74c3c; color: #fff; }

        .action-bar { padding: 10px; border-top: 1px solid #ddd; display: flex; justify-content: flex-end; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 왼쪽: 불일치 목록 -->
        <div class="left-panel">
            <div class="panel-header">불일치 레시피 목록</div>
            <div class="filter-box">
                <input type="text" id="filterInput" placeholder="레시피 검색...">
            </div>
            <div class="recipe-list" id="recipeList"></div>
            <div class="stats">
                <span class="total">전체: <b id="totalCount">0</b></span>
                <span class="fixed">완료: <b id="fixedCount">0</b></span>
            </div>
        </div>

        <!-- 중앙: 현재 레시피 -->
        <div class="center-panel">
            <div class="panel-header">
                <span id="currentRecipeName">레시피를 선택하세요</span>
            </div>
            <div class="current-ingredients" id="currentIngredients">
                <div class="no-recipe">왼쪽에서 레시피를 선택하세요</div>
            </div>
            <div class="action-bar">
                <button class="btn btn-success" onclick="markAsFixed()">확인완료 표시</button>
            </div>
        </div>

        <!-- 오른쪽: 식자재 검색 -->
        <div class="right-panel">
            <div class="panel-header">식자재 검색/추가</div>
            <div class="search-box">
                <input type="text" id="ingredientSearch" placeholder="식자재 검색... (2자 이상)">
            </div>
            <div class="search-results" id="searchResults">
                <div class="no-recipe">검색어를 입력하세요</div>
            </div>
        </div>
    </div>

    <script>
        let mismatchList = [];
        let currentRecipe = null;
        let fixedRecipes = JSON.parse(localStorage.getItem('fixedRecipes') || '[]');

        // 불일치 목록 로드
        async function loadMismatchList() {
            try {
                const res = await fetch('/api/recipe/mismatch-list');
                mismatchList = await res.json();
                renderRecipeList();
            } catch (e) {
                console.error('불일치 목록 로드 실패:', e);
            }
        }

        // 레시피 목록 렌더링
        function renderRecipeList(filter = '') {
            const list = document.getElementById('recipeList');
            const filtered = mismatchList.filter(r =>
                r.recipe_name.toLowerCase().includes(filter.toLowerCase())
            );

            list.innerHTML = filtered.map(r => `
                <div class="recipe-item ${fixedRecipes.includes(r.id) ? 'fixed' : ''} ${currentRecipe?.id === r.id ? 'active' : ''}"
                     onclick="selectRecipe(${r.id})">
                    <div class="id">#${r.id}</div>
                    <div class="name">${r.recipe_name}</div>
                    <div class="missing">누락: ${r.missing_keywords.join(', ')}</div>
                </div>
            `).join('');

            document.getElementById('totalCount').textContent = mismatchList.length;
            document.getElementById('fixedCount').textContent = fixedRecipes.length;
        }

        // 레시피 선택
        async function selectRecipe(id) {
            const recipe = mismatchList.find(r => r.id === id);
            if (!recipe) return;

            currentRecipe = recipe;
            document.getElementById('currentRecipeName').textContent = `#${recipe.id} ${recipe.recipe_name}`;

            // 현재 식자재 로드
            try {
                const res = await fetch(`/api/recipe/${id}/ingredients`);
                const ingredients = await res.json();
                renderCurrentIngredients(ingredients);
            } catch (e) {
                console.error('식자재 로드 실패:', e);
            }

            renderRecipeList(document.getElementById('filterInput').value);

            // 누락 키워드로 자동 검색
            if (recipe.missing_keywords.length > 0) {
                document.getElementById('ingredientSearch').value = recipe.missing_keywords[0];
                searchIngredients(recipe.missing_keywords[0]);
            }
        }

        // 현재 식자재 렌더링
        function renderCurrentIngredients(ingredients) {
            const container = document.getElementById('currentIngredients');
            if (ingredients.length === 0) {
                container.innerHTML = '<div class="no-recipe">식자재가 없습니다</div>';
                return;
            }

            container.innerHTML = ingredients.map(ing => `
                <div class="ing-item">
                    <span class="ing-name">${ing.ingredient_name}</span>
                    <input type="number" class="ing-qty" value="${ing.quantity || 1}" step="0.1"
                           onchange="updateQuantity(${ing.id}, this.value)">
                    <span>${ing.unit || ''}</span>
                    <button class="btn-remove" onclick="removeIngredient(${ing.id})">삭제</button>
                </div>
            `).join('');
        }

        // 식자재 검색
        let searchTimeout;
        async function searchIngredients(query) {
            if (query.length < 2) {
                document.getElementById('searchResults').innerHTML = '<div class="no-recipe">2자 이상 입력하세요</div>';
                return;
            }

            try {
                const res = await fetch(`/api/admin/ingredients-enhanced?search=${encodeURIComponent(query)}&limit=50`);
                const data = await res.json();
                renderSearchResults(data.items || data);
            } catch (e) {
                console.error('검색 실패:', e);
            }
        }

        // 검색 결과 렌더링
        function renderSearchResults(items) {
            const container = document.getElementById('searchResults');
            if (items.length === 0) {
                container.innerHTML = '<div class="no-recipe">검색 결과가 없습니다</div>';
                return;
            }

            container.innerHTML = items.map(item => `
                <div class="search-item" onclick="addIngredient(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                    <span class="s-name">${item.name}</span>
                    <span class="s-unit">${item.package_unit || item.unit || ''}</span>
                    <span class="s-price">${item.selling_price ? item.selling_price.toLocaleString() + '원' : ''}</span>
                </div>
            `).join('');
        }

        // 식자재 추가
        async function addIngredient(item) {
            if (!currentRecipe) {
                alert('레시피를 먼저 선택하세요');
                return;
            }

            try {
                const res = await fetch(`/api/recipe/${currentRecipe.id}/ingredients`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        ingredient_code: item.product_code || item.code,
                        ingredient_name: item.name,
                        specification: item.specification || '',
                        unit: item.package_unit || item.unit || 'EA',
                        quantity: 1,
                        selling_price: item.selling_price || 0,
                        supplier_name: item.supplier_name || ''
                    })
                });

                if (res.ok) {
                    selectRecipe(currentRecipe.id); // 새로고침
                } else {
                    alert('추가 실패');
                }
            } catch (e) {
                console.error('추가 실패:', e);
            }
        }

        // 식자재 삭제
        async function removeIngredient(id) {
            if (!confirm('이 식자재를 삭제하시겠습니까?')) return;

            try {
                const res = await fetch(`/api/recipe/ingredient/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    selectRecipe(currentRecipe.id);
                }
            } catch (e) {
                console.error('삭제 실패:', e);
            }
        }

        // 수량 업데이트
        async function updateQuantity(id, quantity) {
            try {
                await fetch(`/api/recipe/ingredient/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quantity: parseFloat(quantity) })
                });
            } catch (e) {
                console.error('수량 업데이트 실패:', e);
            }
        }

        // 완료 표시
        function markAsFixed() {
            if (!currentRecipe) return;

            if (!fixedRecipes.includes(currentRecipe.id)) {
                fixedRecipes.push(currentRecipe.id);
            } else {
                fixedRecipes = fixedRecipes.filter(id => id !== currentRecipe.id);
            }

            localStorage.setItem('fixedRecipes', JSON.stringify(fixedRecipes));
            renderRecipeList(document.getElementById('filterInput').value);

            // 다음 미완료 레시피로 이동
            const nextRecipe = mismatchList.find(r => !fixedRecipes.includes(r.id) && r.id > currentRecipe.id);
            if (nextRecipe) {
                selectRecipe(nextRecipe.id);
            }
        }

        // 키보드 단축키
        document.addEventListener('keydown', (e) => {
            // Enter: 확인완료 & 다음으로
            if (e.key === 'Enter' && !e.target.matches('input')) {
                e.preventDefault();
                markAsFixed();
            }
            // 위/아래 화살표: 레시피 이동
            if (e.key === 'ArrowDown' && !e.target.matches('input')) {
                e.preventDefault();
                moveToNextRecipe(1);
            }
            if (e.key === 'ArrowUp' && !e.target.matches('input')) {
                e.preventDefault();
                moveToNextRecipe(-1);
            }
            // ESC: 입력창에서 포커스 해제
            if (e.key === 'Escape') {
                document.activeElement.blur();
            }
        });

        // 다음/이전 레시피로 이동
        function moveToNextRecipe(direction) {
            if (!currentRecipe) {
                if (mismatchList.length > 0) selectRecipe(mismatchList[0].id);
                return;
            }
            const currentIdx = mismatchList.findIndex(r => r.id === currentRecipe.id);
            const nextIdx = currentIdx + direction;
            if (nextIdx >= 0 && nextIdx < mismatchList.length) {
                selectRecipe(mismatchList[nextIdx].id);
            }
        }

        // 이벤트 리스너
        document.getElementById('filterInput').addEventListener('input', (e) => {
            renderRecipeList(e.target.value);
        });

        document.getElementById('ingredientSearch').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => searchIngredients(e.target.value), 300);
        });

        // 초기화
        loadMismatchList();

        // 단축키 안내
        console.log('단축키: Enter=확인완료, ↑↓=레시피이동, ESC=포커스해제');
    </script>
</body>
</html>
