<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>협력업체 포털 - 로그인</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/simple-mode.css">
    <script src="/static/js/app-mode.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #667eea 100%);
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            margin: 20px;
        }

        .login-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 2.5rem;
            text-align: center;
            color: white;
        }

        .login-header .icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .login-header .icon i {
            font-size: 2.5rem;
        }

        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .login-form {
            padding: 2.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-input::placeholder {
            color: #aaa;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }

        .error-message.show {
            display: flex;
        }

        .login-footer {
            text-align: center;
            padding: 0 2.5rem 2rem;
            color: #666;
            font-size: 0.85rem;
        }

        .login-footer a {
            color: #667eea;
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .company-info {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }

        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="icon">
                <i class="fas fa-building"></i>
            </div>
            <h1>협력업체 포털</h1>
            <p>다함푸드 발주 관리 시스템</p>
        </div>

        <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <div class="form-group">
                <label for="loginId">아이디</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="loginId" class="form-input"
                           placeholder="아이디를 입력하세요" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" class="form-input"
                           placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
                <i class="fas fa-sign-in-alt"></i>
                <span>로그인</span>
            </button>
        </form>

        <div class="login-footer">
            <p>계정 관련 문의는 담당자에게 연락해주세요.</p>
            <div class="company-info">
                <p><strong>다함푸드</strong></p>
                <p>Tel: 1234-5678</p>
            </div>
        </div>
    </div>

    <script>
        // 이미 로그인된 경우 포털로 이동
        const savedSupplier = localStorage.getItem('supplier_session');
        if (savedSupplier) {
            window.location.href = '/supplier_portal.html';
        }

        async function handleLogin(event) {
            event.preventDefault();

            const loginId = document.getElementById('loginId').value.trim();
            const password = document.getElementById('password').value;
            const btnLogin = document.getElementById('btnLogin');
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            if (!loginId || !password) {
                showError('아이디와 비밀번호를 입력해주세요.');
                return;
            }

            // 버튼 비활성화 및 로딩 표시
            btnLogin.disabled = true;
            btnLogin.innerHTML = '<div class="spinner"></div><span>로그인 중...</span>';
            errorDiv.classList.remove('show');

            try {
                const response = await fetch('/api/supplier/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login_id: loginId, password: password })
                });

                const result = await response.json();

                if (result.success) {
                    // 세션 저장
                    localStorage.setItem('supplier_session', JSON.stringify(result.data));
                    // 포털로 이동
                    window.location.href = '/supplier_portal.html';
                } else {
                    showError(result.error || '로그인에 실패했습니다.');
                    btnLogin.disabled = false;
                    btnLogin.innerHTML = '<i class="fas fa-sign-in-alt"></i><span>로그인</span>';
                }
            } catch (error) {
                console.error('로그인 오류:', error);
                showError('서버 연결에 실패했습니다. 잠시 후 다시 시도해주세요.');
                btnLogin.disabled = false;
                btnLogin.innerHTML = '<i class="fas fa-sign-in-alt"></i><span>로그인</span>';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const form = document.querySelector('.login-form');

            errorText.textContent = message;
            errorDiv.classList.add('show');
            form.classList.add('shake');

            setTimeout(() => form.classList.remove('shake'), 300);
        }
    </script>
</body>
</html>
